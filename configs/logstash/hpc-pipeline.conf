input {
  kafka {
    bootstrap_servers => "kafka:9092"
    topics            => ["hpc-logs"]
    group_id          => "logstash-consumer"
    codec             => "json"
    auto_offset_reset => "earliest"
    consumer_threads  => 6
    max_poll_records  => "500"
    decorate_events   => false
  }
}

filter {

    if [Severity] {
    mutate {
      rename => { "Severity" => "level" }
    }
  }
    mutate {
      uppercase => [ "level" ]
    }

  if [Attributes][hpcmlog.filename] {
    mutate { add_field => { "log_source" => "hpcmlog" } }
  } else if [Attributes][monitoring_services.filename] {
    mutate { add_field => { "log_source" => "monitoring" } }
  } else {
    mutate { add_field => { "log_source" => "syslog" } }
  }

  mutate {
    remove_field => [
      "@version",
      "message", "event","source",
      "source_file", "pipeline",
      "process_id"
    ]
  }
}

output {
  elasticsearch {
    hosts            => ["http://victorialogs:9428/insert/elasticsearch/"]
    http_compression => true
    parameters       => {
      "_msg_field"     => "Body"
      "_time_field"    => "@timestamp"
      "_stream_fields" => "log_source"
    }
  }
}