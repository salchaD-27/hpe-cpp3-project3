global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: slack
  routes:
    - match:
        severity: critical
      receiver: slack-critical
      continue: false
    - match:
        severity: warning
      receiver: slack-warning
      continue: false

receivers:
  - name: slack
    slack_configs:
      - api_url: "$SLACK_WEBHOOK_URL"
        channel: "#all-hpc-logs"
        send_resolved: true
        title: ":rotating_light: [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
        text: |
          *Severity:* `{{ .CommonLabels.severity }}`
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}

  - name: slack-critical
    slack_configs:
      - api_url: "$SLACK_WEBHOOK_URL"
        channel: "#all-hpc-logs"
        send_resolved: true
        color: "danger"
        title: ":rotating_light: [CRITICAL] {{ .CommonLabels.alertname }}"
        text: |
          *Severity:* `critical`
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}

  - name: slack-warning
    slack_configs:
      - api_url: "$SLACK_WEBHOOK_URL"
        channel: "#all-hpc-logs"
        send_resolved: true
        color: "warning"
        title: ":warning: [WARNING] {{ .CommonLabels.alertname }}"
        text: |
          *Severity:* `warning`
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname"]
