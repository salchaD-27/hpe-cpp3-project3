services:

  generator:
    build: ./generator
    container_name: log-generator
    volumes:
      - ./logs:/logs
    restart: unless-stopped
    networks:
      observability:
        ipv4_address: 172.29.0.50

  kafka:
    image: apache/kafka:3.9.2
    container_name: kafka
    hostname: kafka
    ports:
      - "19092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://172.29.0.10:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@172.29.0.10:9093
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS: "1"    
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"        
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"    
    volumes:
      - ./kafka/data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      observability:
        ipv4_address: 172.29.0.10

  fluentbit:
    image: fluent/fluent-bit:4.2.3
    container_name: fluentbit
    command: ["/fluent-bit/bin/fluent-bit", "-c", "/fluent-bit/etc/fluent-bit.yaml"]
    restart: unless-stopped
    ports:
      - "2020:2020"
    volumes:
      - ./logs:/logs
      - ./fluent_bit/conf.yaml:/fluent-bit/etc/fluent-bit.yaml
      - ./fluent_bit/parsers.conf:/fluent-bit/etc/parsers.conf
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      observability:
        ipv4_address: 172.29.0.40

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: logstash
    volumes:
      - ./logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    depends_on:
      kafka:
        condition: service_healthy
      victorialogs:
        condition: service_started
    restart: unless-stopped
    networks:
      observability:
        ipv4_address: 172.29.0.30

  victorialogs:
    image: victoriametrics/victoria-logs:latest
    container_name: victorialogs
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=7d"
      - "-httpListenAddr=:9428"
    volumes:
      - ./victoria_logs/victoria-logs-data:/storage
    ports:
      - "9428:9428"
    networks:
      observability:
        ipv4_address: 172.29.0.20

  grafana:
    image: grafana/grafana:11.3.3
    ports:
      - "3000:3000"
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - victorialogs
    networks:
      observability:
        ipv4_address: 172.29.0.60

volumes:
  kafka-data:
  grafana-data:

networks:
  observability:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/24