[SERVICE]
    Flush           1
    Daemon          Off
    Log_Level       debug
    Parsers_File    /fluent-bit/etc/parsers/parser.conf
    HTTP_Server     On
    HTTP_Listen     0.0.0.0
    HTTP_Port       2020

[INPUT]
    Name             tail
    Path             /logs/*.log
    Path_Key         source_file
    Tag              app.logs
    Parser           json_parser
    Refresh_Interval 1
    Mem_Buf_Limit    100MB
    Skip_Long_Lines  On
    Read_from_Head   On

# Error logs input
[INPUT]
    Name             tail
    Path             /logs/error-logs/*.log
    Path_Key         source_file
    Tag              error.logs
    Parser           json_parser
    Refresh_Interval 1
    Mem_Buf_Limit    100MB
    Skip_Long_Lines  Off
    Read_from_Head   On

[FILTER]
    Name    modify
    Match   app.logs
    Add     pipeline fluentbit

[FILTER]
    Name       record_modifier
    Match      app.logs
    Remove_key @timestamp

[OUTPUT]
    Name            kafka
    Match           app.logs
    Brokers         kafka:9092
    Topics          logs
    Format          json
    Timestamp_Key   @timestamp
    Timestamp_Format iso8601
    rdkafka.request.required.acks        1
    rdkafka.log.connection.close         false
    rdkafka.compression.codec            lz4
    rdkafka.batch.num.messages           1000
    rdkafka.queue.buffering.max.messages 100000
    rdkafka.linger.ms                    20