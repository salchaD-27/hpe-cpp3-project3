[SERVICE]
    Flush            1
    Log_Level        info
    Daemon           Off
    HTTP_Server      On
    HTTP_Listen      0.0.0.0
    HTTP_Port        2020
    Parsers_File     /etc/fluent-bit/parsers.conf
    storage.path     /var/lib/fluent-bit/storage
    storage.sync     normal
    storage.checksum on
    storage.backlog.mem_limit 50MB

[INPUT]
    Name             tail
    Path             /var/log/hpc-simulator/*.log
    Tag              hpc.logs
    Parser           hpc_json
    DB               /var/lib/fluent-bit/tail.db
    Mem_Buf_Limit    100MB
    Skip_Long_Lines  On
    Refresh_Interval 5

[FILTER]
    Name    modify
    Match   hpc.logs
    Add     pipeline  fluent-bit
    Add     source    hpc-simulator

[OUTPUT]
    Name             kafka
    Match            hpc.*
    Brokers          localhost:9092
    Topics           hpc-logs
    Timestamp_Key    _time
    rdkafka.request.required.acks        1
    rdkafka.log.connection.close         false
    rdkafka.compression.codec            lz4
    rdkafka.batch.num.messages           1000
    rdkafka.queue.buffering.max.messages 100000
    rdkafka.linger.ms                    20
    rdkafka.socket.keepalive.enable      true
