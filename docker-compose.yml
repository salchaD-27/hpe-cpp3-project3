services:

  generator:
    build: ./1-gen
    container_name: log-generator
    volumes:
      - ./0-logs:/logs

  fluentbit:
    image: fluent/fluent-bit:4.2.3
    container_name: fluentbit
    volumes:
      - ./0-logs:/logs
      - ./2-fluentbit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf
      - ./2-fluentbit/parser.conf:/fluent-bit/etc/parser.conf
    command: >
      /fluent-bit/bin/fluent-bit
      -c /fluent-bit/etc/fluent-bit.conf
    depends_on:
      - generator
      - kafka

  kafka:
    image: apache/kafka:3.9.2
    container_name: kafka
    ports:
      - "19092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LOG_DIRS: /var/lib/kafka/data

    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-init:
    image: apache/kafka:3.9.2
    depends_on:
      - kafka
    entrypoint: ["/bin/bash","-c"]
    command: |
      echo "Waiting for Kafka broker..."
      sleep 20

      echo "Creating topic if it does not exist..."

      /opt/kafka/bin/kafka-topics.sh \
        --create \
        --if-not-exists \
        --topic logs \
        --bootstrap-server kafka:9092 \
        --partitions 6 \
        --replication-factor 1 \
        --config retention.ms=86400000 \
        --config segment.bytes=104857600

      echo "Kafka topic ready"

volumes:
  kafka-data: