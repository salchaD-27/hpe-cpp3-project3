services:
  generator:
    build: ./0-logs-generation
    container_name: log-generator
    volumes:
      - ./1-logs-storage:/logs
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.9.2
    container_name: kafka
    ports:
      - "19092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  fluentbit:
    image: fluent/fluent-bit:4.2.3
    container_name: fluentbit
    restart: unless-stopped
    ports:
      - "2020:2020"
    volumes:
      - ./1-logs-storage:/logs:ro
      - ./2-fluentbit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./2-fluentbit/parser.conf:/fluent-bit/etc/parsers/parser.conf:ro
    depends_on:
      kafka:
        condition: service_healthy

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: logstash
    volumes:
      - ./4-logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./4-logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    depends_on:
      kafka:
        condition: service_healthy
      victorialogs:
        condition: service_started
    restart: unless-stopped

  victorialogs:
    image: victoriametrics/victoria-logs:latest
    container_name: victorialogs
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=1y"
      - "-httpListenAddr=:9428"
    volumes:
      - ./5-victorialogs/storage-data:/storage
    ports:
      - "9428:9428"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: victoriametrics-logs-datasource
    volumes:
      - ./6-grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - victorialogs

  vmalert:
    image: victoriametrics/vmalert:latest
    container_name: vmalert
    ports:
      - "8880:8880"
    command:
      - "-datasource.url=http://victorialogs:9428"
      - "-datasource.queryStep=30s"
      - "-notifier.url=http://alertmanager:9093"
      - "-rule=/etc/alerts/*.yml"
      - "-evaluationInterval=30s"
      - "-httpListenAddr=:8880"
    volumes:
      - ./7-alerting/alerts.yml:/etc/alerts/alerts.yml:ro
    depends_on:
      - victorialogs
      - alertmanager

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9094:9093"
    volumes:
      - ./7-alerting/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"

volumes:
  kafka-data:
  grafana-data: