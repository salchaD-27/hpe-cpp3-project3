services:

  generator:
    build: ./1-gen
    container_name: log-generator
    volumes:
      - ./0-logs:/logs
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.9.2
    container_name: kafka
    ports:
      - "19092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS: "1"    
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"        
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"    
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  fluentbit:
    image: fluent/fluent-bit:4.2.3
    container_name: fluentbit
    restart: unless-stopped
    ports:
      - "2020:2020"
    volumes:
      - ./0-logs:/logs:ro
      - ./2-fluentbit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./2-fluentbit/parser.conf:/fluent-bit/etc/parsers/parser.conf:ro
    depends_on:
      kafka:
        condition: service_healthy

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: logstash
    volumes:
      - ./4-logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./4-logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    depends_on:
      kafka:
        condition: service_healthy
      victorialogs:
        condition: service_started
    restart: unless-stopped

  victorialogs:
    image: victoriametrics/victoria-logs:latest
    container_name: victorialogs
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=7d"
      - "-httpListenAddr=:9428"
    volumes:
      - ./5-victorialogs/storage-data:/storage
    ports:
      - "9428:9428"

volumes:
  kafka-data: