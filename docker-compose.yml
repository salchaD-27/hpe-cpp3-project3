# =============================================================================
# HPC Log Pipeline - Single Node Docker Setup
# Pipeline: Simulator → Fluent Bit → Kafka → Logstash → VictoriaLogs → Grafana
#           VictoriaLogs → vmalert → Alertmanager
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Log Simulator
  # Reads original JSON logs and streams them as JSONL at a configurable rate
  # ---------------------------------------------------------------------------
  simulator:
    image: python:3.12-slim
    container_name: simulator
    volumes:
      - ./scripts:/scripts:ro
      - ./scripts/logs-original:/scripts/logs-original:ro
      - ./generated-logs:/generated-logs
    command: python /scripts/simulator.py
    restart: unless-stopped
    networks:
      - pipeline
    depends_on:
      - fluent-bit

  # ---------------------------------------------------------------------------
  # Kafka (KRaft mode - no ZooKeeper)
  # Single broker, single partition (single-node setup)
  # ---------------------------------------------------------------------------
  kafka:
    image: apache/kafka:4.0.2
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - pipeline

  # ---------------------------------------------------------------------------
  # Fluent Bit
  # Tails JSONL log files and forwards to Kafka
  # ---------------------------------------------------------------------------
  fluent-bit:
    image: cr.fluentbit.io/fluent/fluent-bit:4.0.2
    container_name: fluent-bit
    ports:
      - "2020:2020"      # HTTP metrics endpoint
    volumes:
      - ./configs/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./configs/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ./generated-logs:/generated-logs:ro
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pipeline

  # ---------------------------------------------------------------------------
  # Logstash
  # Consumes from Kafka, transforms, and ships to VictoriaLogs
  # ---------------------------------------------------------------------------
  logstash:
    image: docker.elastic.co/logstash/logstash:9.2.8
    container_name: logstash
    volumes:
      - ./configs/logstash/hpc-pipeline.conf:/usr/share/logstash/pipeline/hpc-pipeline.conf:ro
      
      # config
      - ./configs/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro

      # DLQ
      - ./data/logstash-dlq:/usr/share/logstash/data/dlq

    ports:
      - "9600:9600"
    depends_on:
      kafka:
        condition: service_healthy
      victorialogs:
        condition: service_started
    restart: unless-stopped
    networks:
      - pipeline

  # ---------------------------------------------------------------------------
  # VictoriaLogs
  # Log storage and query backend
  # ---------------------------------------------------------------------------
  victorialogs:
    image: victoriametrics/victoria-logs:v1.49.0
    container_name: victorialogs
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=1y"
      - "-httpListenAddr=:9428"
    volumes:
      - victorialogs-data:/storage
    ports:
      - "9428:9428"      # HTTP API + UI
    networks:
      - pipeline

  # ---------------------------------------------------------------------------
  # Grafana
  # Visualization dashboards
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: victoriametrics-logs-datasource
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - victorialogs
    networks:
      - pipeline

  # ---------------------------------------------------------------------------
  # vmalert
  # Evaluates alerting rules against VictoriaLogs
  # ---------------------------------------------------------------------------
  vmalert:
    image: victoriametrics/vmalert:latest
    container_name: vmalert
    ports:
      - "8880:8880"
    command:
      - "-datasource.url=http://victorialogs:9428"
      - "-datasource.queryStep=30s"
      - "-notifier.url=http://alertmanager:9093"
      - "-rule=/etc/alerts/alerts.yml"
      - "-evaluationInterval=30s"
      - "-httpListenAddr=:8880"
    volumes:
      - ./alerting/alerts.yml:/etc/alerts/alerts.yml:ro
    depends_on:
      - victorialogs
      - alertmanager
    networks:
      - pipeline

  # ---------------------------------------------------------------------------
  # Alertmanager
  # Routes alerts to notification channels (Slack, email, webhook, etc.)
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.31.1
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alerting/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    networks:
      - pipeline
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pipeline

# =============================================================================
# Volumes & Networks
# =============================================================================
volumes:
  kafka-data:
  logstash-dlq:
  victorialogs-data:
  grafana-data:

networks:
  pipeline:
    driver: bridge
