input {
  kafka {
    bootstrap_servers  => "kafka:9092"
    topics             => ["logs"]
    group_id           => "logstash-vl7"
    auto_offset_reset  => "earliest"
    consumer_threads   => 1
    codec              => json
    max_poll_records   => "500"
    poll_timeout_ms    => "1000"
    decorate_events    => false
  }
}

filter {
  ruby {
    code => '
      # Fix @timestamp float issue
      t = event.get("@timestamp")
      if t
        event.set("@timestamp", LogStash::Timestamp.now)
      end

      # Set _time from @timestamp field value
      ts = event.get("@timestamp")
      event.set("_time", ts.to_s) if ts

      # Set _msg from Body
      body = event.get("Body")
      event.set("_msg", body) if body && !body.to_s.empty?

      # Set level from Severity
      sev = event.get("Severity")
      event.set("level", sev) if sev

      # Flatten Resource
      resource = event.get("Resource") || {}
      event.set("service_name",    resource["service.name"]    || "unknown")
      event.set("host_name",       resource["host.name"]       || "")

      # Flatten Attributes
      attrs = event.get("Attributes") || {}
      attrs.each do |k, v|
        event.set("attr_#{k.gsub(".", "_")}", v)
      end

      # Set stream from source_file
      sf = event.get("source_file") || ""
      if sf.include?("hpcmlog")
        event.set("vl_stream", "hpcmlog")
      elsif sf.include?("monitoring")
        event.set("vl_stream", "monitoring")
      elsif sf.include?("syslog")
        event.set("vl_stream", "syslog")
      else
        event.set("vl_stream", "default")
      end
    '
  }

  mutate {
    add_field    => { "ingest_stage" => "logstash" }
    remove_field => [ "@version", "Body", "Severity", "Resource", "Attributes", "message", "event" ]
  }
}

output {
  http {
    url               => "http://victorialogs:9428/insert/jsonline"
    http_method       => "post"
    format            => "json"
    headers           => { "Content-Type" => "application/json" }
    automatic_retries => 3
    retry_failed      => true
  }
}