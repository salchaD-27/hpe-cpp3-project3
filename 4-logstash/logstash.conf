input {
  kafka {
    bootstrap_servers => "kafka:9092"
    topics => ["logs"]
    group_id => "logstash-vl7"
    auto_offset_reset => "earliest"
    consumer_threads => 1
    codec => "json"
  }
}

filter {
  # Convert any existing array fields to strings
  mutate {
    convert => {
      "[level]" => "string"
      "[host_name]" => "string"
      "[service_name]" => "string"
    }
  }
  
  # Rename fields
  mutate {
    rename => { "Body" => "_msg" }
    rename => { "Severity" => "level" }
  }
  
  # Handle missing level
  if ![level] or [level] == "" {
    mutate { replace => { "level" => "INFO" } }
  }
  
  # Uppercase level
  mutate { uppercase => [ "level" ] }
  
  # Extract host and service names
  if [Resource][host.name] {
    mutate { replace => { "host_name" => "%{[Resource][host.name]}" } }
  } else {
    mutate { replace => { "host_name" => "unknown" } }
  }
  
  if [Resource][service.name] {
    mutate { replace => { "service_name" => "%{[Resource][service.name]}" } }
  } else {
    mutate { replace => { "service_name" => "unknown" } }
  }
  
  # Set vl_stream based on source_file
  if [source_file] {
    if [source_file] =~ /hpcmlog/ {
      mutate { replace => { "vl_stream" => "hpcmlog" } }
    } else if [source_file] =~ /monitoring/ {
      mutate { replace => { "vl_stream" => "monitoring" } }
    } else if [source_file] =~ /syslog/ {
      mutate { replace => { "vl_stream" => "syslog" } }
    } else {
      mutate { replace => { "vl_stream" => "default" } }
    }
  } else {
    mutate { replace => { "vl_stream" => "default" } }
  }
  
  # Use Ruby to create the _stream field
  ruby {
    code => '
      host = event.get("host_name") || "unknown"
      level = event.get("level") || "INFO"
      stream = event.get("vl_stream") || "default"
      event.set("_stream", "{host_name=\"#{host}\",level=\"#{level}\",vl_stream=\"#{stream}\"}")
    '
  }
  
  # Add timestamp and ingest stage
  mutate {
    add_field => { "_time" => "%{@timestamp}" }
    add_field => { "ingest_stage" => "logstash" }
  }
  
  # Remove unnecessary fields
  mutate {
    remove_field => [
      "@version", "Severity", "SeverityText", "Resource",
      "Attributes", "message", "event", "source_file",
      "pipeline", "process_id", "@timestamp"
    ]
  }
}

output {
  # Primary output to VictoriaLogs
  http {
    url => "http://victorialogs:9428/insert/jsonline"
    http_method => "post"
    format => "json"
    headers => { "Content-Type" => "application/json" }
    automatic_retries => 3
    retry_failed => true
  }
  
  # Optional: Write failed events to a file for debugging
  # This will capture events that can't be sent to VictoriaLogs
  if "_http_response_code" in [event] and [event][_http_response_code] >= 400 {
    file {
      path => "/usr/share/logstash/data/failed_events.log"
      codec => line { format => "%{message}" }
    }
  }
}