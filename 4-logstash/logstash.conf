input {
  kafka {
    bootstrap_servers  => "kafka:9092"
    topics             => ["logs"]
    group_id           => "logstash-vl6"
    auto_offset_reset  => "earliest"
    consumer_threads   => 1
    codec              => json
    max_poll_records   => "500"
    poll_timeout_ms    => "1000"
    decorate_events    => false
  }
}

filter {
  ruby {
    code => '
      t = event.get("_time")
      if t
        event.set("@timestamp", LogStash::Timestamp.new(Time.parse(t)))
      end
    '
  }
  mutate {
    add_field    => { "ingest_stage" => "logstash" }
    remove_field => ["@version"]
  }
}

output {
  http {
    url               => "http://victorialogs:9428/insert/jsonline"
    http_method       => "post"
    format            => "json"
    headers           => { "Content-Type" => "application/json" }
    automatic_retries => 3
    retry_failed      => true
  }
}