input {
  kafka {
    bootstrap_servers  => "kafka:9092"
    topics             => ["logs"]
    group_id           => "logstash-vl6"
    auto_offset_reset  => "earliest"
    consumer_threads   => 1
    codec              => json
    max_poll_records   => "500"
    poll_timeout_ms    => "1000"
    decorate_events    => false
  }
}

filter {
  # Parse the incoming log (already JSON)
  json {
    source => "message"
    target => "parsed"
    skip_on_invalid_json => true
  }
  
  # If message is already parsed, use it directly
  if [parsed] {
    ruby {
      code => '
        parsed = event.get("parsed")
        parsed.each do |key, value|
          event.set(key, value)
        end
        event.remove("parsed")
        event.remove("message")
      '
    }
  }
  
  # Transform fields for VictoriaLogs
  mutate {
    rename => {
      "[@timestamp]" => "_time"
      "Body" => "_msg"
      "Severity" => "level"
    }
  }
  
  # Extract service name from Resource
  ruby {
    code => '
      resource = event.get("Resource")
      if resource
        event.set("service_name", resource["service.name"])
        event.set("service_version", resource["service.version"])
        event.remove("Resource")
      end
      
      # Flatten Attributes
      attributes = event.get("Attributes")
      if attributes
        attributes.each do |key, value|
          event.set("attr_#{key}", value)
        end
        event.remove("Attributes")
      end
    '
  }
  
  # Add stream based on log source
  ruby {
    code => '
      source_file = event.get("source_file")
      if source_file
        if source_file.include?("app.log")
          event.set("_stream", "application")
        elsif source_file.include?("system.log")
          event.set("_stream", "system")
        elsif source_file.include?("security.log")
          event.set("_stream", "security")
        else
          event.set("_stream", "default")
        end
      else
        event.set("_stream", "default")
      end
    '
  }
  
  # Ensure timestamp is proper format
  date {
    match => ["_time", "ISO8601"]
    target => "@timestamp"
  }
  
  # Add metadata
  mutate {
    add_field => {
      "ingest_stage" => "logstash"
      "pipeline_version" => "1.0"
    }
    remove_field => ["@version", "host", "path"]
  }
}

output {
  # Debug output (optional)
  stdout {
    codec => rubydebug
  }
  
  # Send to VictoriaLogs
  http {
    url               => "http://victorialogs:9428/insert/jsonline"
    http_method       => "post"
    format            => "json"
    content_type      => "application/x-ndjson"
    http_compression  => false
    automatic_retries => 3
    retry_failed      => true
    
    # Custom headers for stream routing
    headers => {
      "User-Agent" => "Logstash/8.13.4"
    }
  }
}