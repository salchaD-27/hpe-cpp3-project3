input {
  kafka {
    bootstrap_servers => "localhost:9092"
    topics            => ["hpc-logs"]
    group_id          => "logstash-vlogs-consumer"
    client_id         => "logstash-consumer"
    codec             => "json"
    consumer_threads  => 6
    auto_offset_reset => "earliest"
    enable_auto_commit => true
    decorate_events   => true
  }
}

filter {
  # If log arrived as wrapped string (Fluent Bit parser missing)
  # parse the inner JSON from "log" field
  if [log] {
    json {
      source => "log"
      target => "parsed"
    }
    mutate {
      rename => { "[parsed][_msg]"    => "_msg"    }
      rename => { "[parsed][_time]"   => "_time"   }
      rename => { "[parsed][node]"    => "node"    }
      rename => { "[parsed][service]" => "service" }
      rename => { "[parsed][level]"   => "level"   }
      rename => { "[parsed][job_id]"  => "job_id"  }
      rename => { "[parsed][cluster]" => "cluster" }
      remove_field => ["log", "parsed"]
    }
  }

  # Ensure _msg exists
  if ![_msg] or [_msg] == "%{message}" {
    mutate { replace => { "_msg" => "unknown log message" } }
  }

  # Parse _time into @timestamp
  if [_time] {
    date {
      match  => ["_time", "ISO8601"]
      target => "@timestamp"
    }
  }

  # Add tracking
  mutate {
    add_field => { "ingest_stage" => "logstash" }
    remove_field => ["@version", "event", "message", "host", "tags"]
  }
}

output {
  http {
    url          => "http://localhost:9428/insert/jsonline"
    http_method  => "post"
    content_type => "application/stream+json"
    format       => "json"
    pool_max                => 200
    pool_max_per_route      => 100
    automatic_retries       => 3
    retry_failed            => true
  }
}
