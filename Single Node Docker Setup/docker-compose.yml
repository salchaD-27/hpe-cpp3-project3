services:

  simulator:
    image: python:3.12-slim
    container_name: simulator
    volumes:
      - C:\hpc-log-pipeline\scripts:/scripts
      - C:\hpc-log-pipeline\logs:/logs
    command: python /scripts/simulator.py
    restart: unless-stopped

  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  fluent-bit:
    image: cr.fluentbit.io/fluent/fluent-bit:4.0.2
    container_name: fluent-bit
    ports:
      - "2020:2020"
    volumes:
      - C:\hpc-log-pipeline\configs\fluent-bit\fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - C:\hpc-log-pipeline\configs\fluent-bit\parsers.conf:/fluent-bit/etc/parsers/parser.conf:ro
      - C:\hpc-log-pipeline\logs:/logs:ro
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  logstash:
    image: docker.elastic.co/logstash/logstash:9.3.2
    container_name: logstash
    volumes:
      - C:\hpc-log-pipeline\configs\logstash\hpc-pipeline.conf:/usr/share/logstash/pipeline/hpc-pipeline.conf:ro
      - C:\hpc-log-pipeline\configs\logstash\logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - C:\hpc-log-pipeline\data\dlq:/usr/share/logstash/data/dlq
    depends_on:
      kafka:
        condition: service_healthy
      victorialogs:
        condition: service_started
    ports:
      - "9600:9600"
    restart: unless-stopped

  victorialogs:
    image: victoriametrics/victoria-logs:v1.49.0
    container_name: victorialogs
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=1y"
      - "-httpListenAddr=:9428"
    volumes:
      - C:\hpc-log-pipeline\data\victorialogs:/storage
    ports:
      - "9428:9428"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: victoriametrics-logs-datasource
    volumes:
      - C:\hpc-log-pipeline\grafana\datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - victorialogs

  vmalert:
    image: victoriametrics/vmalert:latest
    container_name: vmalert
    ports:
      - "8880:8880"
    command:
      - "-datasource.url=http://victorialogs:9428"
      - "-datasource.queryStep=30s"
      - "-notifier.url=http://alertmanager:9093"
      - "-rule=/etc/alerts/*.yml"
      - "-evaluationInterval=30s"
      - "-httpListenAddr=:8880"
    volumes:
      - C:\hpc-log-pipeline\alerting\alerts.yml:/etc/alerts/alerts.yml:ro
    depends_on:
      - victorialogs
      - alertmanager

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9094:9093"
    volumes:
      - C:\hpc-log-pipeline\alerting\alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"

volumes:
  kafka-data:
  grafana-data: