input {
  kafka {
    bootstrap_servers => "kafka:9092"
    topics            => ["hpc-logs"]
    group_id          => "logstash-consumer"
    codec             => "json"
    auto_offset_reset => "earliest"
    consumer_threads  => 1
    max_poll_records  => "500"
    decorate_events   => false
  }
}

filter {
  mutate {
    add_field => { "_time" => "%{@timestamp}" }
  }

  mutate {
    rename => { "Body" => "_msg" }
  }

  mutate {
    rename => { "Severity" => "level" }
  }

  if ![level] or [level] == "" {
    mutate {
      rename => { "SeverityText" => "level" }
    }
  }

  mutate {
    uppercase => [ "level" ]
  }

  mutate {
    rename => {
      "[Resource][host.name]"    => "host_name"
      "[Resource][service.name]" => "service_name"
    }
  }

  if [source_file] =~ /hpcmlog/ {
    mutate { add_field => { "vl_stream" => "hpcmlog" } }
  } else if [source_file] =~ /monitoring/ {
    mutate { add_field => { "vl_stream" => "monitoring" } }
  } else if [source_file] =~ /syslog/ {
    mutate { add_field => { "vl_stream" => "syslog" } }
  } else {
    mutate { add_field => { "vl_stream" => "default" } }
  }

  if [level] == "ERROR" {
    mutate {
      add_field => {
        "critical"      => "true"
        "action_needed" => "immediate"
      }
    }
  } else if [level] == "WARN" or [level] == "WARNING" {
    mutate {
      add_field => { "action_needed" => "monitor" }
    }
  }

  mutate {
    remove_field => [
      "@version", "@timestamp",
      "Severity", "SeverityText", "Resource",
      "message", "event",
      "source_file", "pipeline",
      "process_id"
    ]
  }
}

output {
  elasticsearch {
    hosts => ["http://victorialogs:9428/insert/elasticsearch/"]
    parameters => {
      "_msg_field"     => "_msg"
      "_time_field"    => "_time"
      "_stream_fields" => "vl_stream,host_name,level"
    }
    http_compression => true
  }
}