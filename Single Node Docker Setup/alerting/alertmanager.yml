global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: default

  routes:
    - match:
        severity: critical
      receiver: critical-alerts
      group_wait: 10s
      repeat_interval: 30m

    - match:
        severity: warning
      receiver: warning-alerts
      group_wait: 30s
      repeat_interval: 1h

receivers:
  - name: default
  - name: critical-alerts
  - name: warning-alerts

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning