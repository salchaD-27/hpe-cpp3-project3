groups:
  - name: hpc-alerts
    interval: 30s
    type: vlogs
    rules:

      - alert: ClusterErrorDetected
        expr: 'level:ERROR | stats count() as total'
        for: 1m
        annotations:
          summary: "ERROR level logs detected across HPC cluster"
          description: "Sustained ERROR logs across one or more streams."
        labels:
          severity: critical

      - alert: HardwareFailure
        expr: 'vl_stream:hpcmlog AND ("Unable to Get Channel Cipher Suites" OR "unreachable") | stats count() as total'
        for: 0m
        annotations:
          summary: "Hardware failure detected on HPC node"
          description: "IPMI sensor collection failed or compute node is unreachable."
        labels:
          severity: critical

      - alert: InfrastructureWarning
        expr: 'vl_stream:hpcmlog AND ("verify_mounts" OR "cm_nfs" OR "ctdb") AND ("fail" OR "error") | stats count() as total'
        for: 2m
        annotations:
          summary: "Infrastructure service issue on HPC cluster"
          description: "Filesystem mounts, NFS, or CTDB reporting failures."
        labels:
          severity: warning

      - alert: PipelineIngestionStopped
        expr: 'ingest_stage:logstash | stats count() as total'
        for: 5m
        annotations:
          summary: "Log ingestion pipeline has stopped"
          description: "No logs received from Logstash for 5 minutes."
        labels:
          severity: critical