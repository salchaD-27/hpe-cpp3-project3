global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: default

# receivers:
#   - name: default
#     webhook_configs:
#       - url: "http://localhost:5001/alerts"  # swap for slack/email/pagerduty
receivers:
  - name: default
    webhook_configs:
      - url: "http://host.docker.internal:5001/alerts"