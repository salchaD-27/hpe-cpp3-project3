input {
  kafka {
    bootstrap_servers => "172.29.0.10:9092"
    topics => ["logs"]
    group_id => "logstash-consumer"
    auto_offset_reset => "latest"
  }
}

filter {
  json {
    source => "message"
  }

  mutate {
    add_field => {
      "service_name" => "%{[Resource][service.name]}"
      "host_name" => "%{[Resource][host.name]}"
      "log_type" => "%{[Attributes][type]}"
    }
  }

  if [@timestamp] {
    date {
      match => ["@timestamp", "UNIX", "UNIX_MS", "ISO8601"]
      target => "@timestamp"
    }
  }

  mutate {
    remove_field => ["message", "event"]
  }

  mutate {
  add_field => { "pipeline" => "hpc-log-ingestion" }
  }
}

output {
  stdout { codec => rubydebug }

  elasticsearch {
    hosts => ["http://172.29.0.20:9428/insert/elasticsearch/"]
    index => "logs"
    parameters => {
        "_msg_field" => "Body"
        "_time_field" => "@timestamp"
        "_stream_fields" => "service_name,host_name,log_type"
    }
  }

  # http {
  #   url => "http://localhost:9428/insert/jsonline?_stream_fields=host.ip,process.name&_msg_field=message&_time_field=@timestamp"
  #   format => "json_batch"
  #   http_method => "post"
  #   headers => {
  #     "Content-Type" => "application/json"
  #   }
  # }
}