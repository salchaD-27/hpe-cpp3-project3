input {
  kafka {
    bootstrap_servers => "localhost:9092"
    topics => ["logs"]
    group_id => "logstash-consumer"
    auto_offset_reset => "latest"
  }
}

filter {
  json {
    source => "message"
    target => "parsed"
  }

  mutate {
    rename => {
      "[parsed][level]" => "level"
      "[parsed][service]" => "service"
      "[parsed][message]" => "message"
      "[parsed][timestamp]" => "timestamp"
      "[parsed][@timestamp]" => "payload_timestamp"
    }
  }

  date {
    match => ["timestamp", "yyyy-MM-dd HH:mm:ss"]
    target => "@timestamp"
  }

  if [payload_timestamp] {
    date {
      match => ["payload_timestamp", "UNIX", "UNIX_MS"]
      target => "@timestamp"
    }
  }

  mutate {
    remove_field => ["parsed", "payload_timestamp", "event"]
  }

  mutate {
  add_field => { "pipeline" => "hpc-log-ingestion" }
  }
}

output {
  stdout { codec => rubydebug }

  elasticsearch {
    hosts => ["http://localhost:9428/insert/elasticsearch/"]
    index => "logs"
    parameters => {
        "_msg_field" => "message"
        "_time_field" => "@timestamp"
        "_stream_fields" => "host.name,process.name"
    }
  }

  # http {
  #   url => "http://localhost:9428/insert/jsonline?_stream_fields=host.ip,process.name&_msg_field=message&_time_field=@timestamp"
  #   format => "json_batch"
  #   http_method => "post"
  #   headers => {
  #     "Content-Type" => "application/json"
  #   }
  # }
}